<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fee Receipt - {{ payment.receipt_number }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @page { size: A4; margin: 8mm; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: #e5e7eb;
            color: #111827;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 12px;
        }
        .toolbar {
            width: 210mm;
            margin: 12px auto;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        .btn {
            border: 1px solid #0f766e;
            background: #0f766e;
            color: #fff;
            border-radius: 6px;
            padding: 9px 14px;
            font-weight: 700;
            cursor: pointer;
        }
        .sheet {
            width: 210mm;
            margin: 0 auto 18px;
            background: #fff;
            padding: 8mm;
            box-shadow: 0 16px 40px rgba(15, 23, 42, .18);
        }
        .copy {
            min-height: 112mm;
            border: 1.5px solid #111827;
            padding: 5mm;
            display: flex;
            flex-direction: column;
            break-inside: avoid;
            page-break-inside: avoid;
        }
        .student-copy {
            min-height: 132mm;
            break-inside: auto;
            page-break-inside: auto;
        }
        .copy + .copy { margin-top: 7mm; }
        .cut-line {
            margin: 4mm 0;
            border-top: 1px dashed #9ca3af;
            text-align: center;
            color: #6b7280;
            font-size: 10px;
            line-height: 0;
        }
        .cut-line span {
            background: #fff;
            padding: 0 8px;
        }
        .receipt-top {
            display: grid;
            grid-template-columns: 18mm 1fr auto;
            gap: 10px;
            border-bottom: 2px solid #111827;
            padding-bottom: 7px;
            margin-bottom: 8px;
            align-items: center;
        }
        .school-logo {
            width: 17mm;
            height: 17mm;
            border: 1px solid #d1d5db;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #9ca3af;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .school-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .institute-name {
            font-size: 19px;
            line-height: 1.1;
            font-weight: 800;
            text-transform: uppercase;
        }
        .institute-meta {
            margin-top: 4px;
            color: #374151;
            line-height: 1.35;
            max-width: 118mm;
        }
        .copy-badge {
            border: 1px solid #111827;
            padding: 6px 10px;
            min-width: 35mm;
            text-align: center;
            font-weight: 800;
            text-transform: uppercase;
        }
        .receipt-title {
            font-size: 15px;
            margin-top: 8px;
            color: #0f766e;
        }
        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 14px;
            margin: 8px 0;
        }
        .field {
            display: grid;
            grid-template-columns: 34mm 1fr;
            gap: 5px;
            min-height: 18px;
            align-items: start;
        }
        .label {
            color: #4b5563;
            font-weight: 700;
        }
        .value {
            border-bottom: 1px solid #d1d5db;
            padding-bottom: 2px;
            font-weight: 700;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 8px;
        }
        th, td {
            border: 1px solid #111827;
            padding: 5px 6px;
            text-align: left;
            vertical-align: top;
        }
        th {
            background: #f3f4f6;
            font-size: 11px;
            text-transform: uppercase;
        }
        .due-breakup {
            margin-top: 7px;
        }
        .due-breakup th,
        .due-breakup td {
            padding: 4px 6px;
            font-size: 11px;
        }
        .amount {
            text-align: right;
            white-space: nowrap;
            font-weight: 800;
        }
        .summary {
            display: grid;
            grid-template-columns: 1fr 65mm;
            gap: 12px;
            margin-top: 8px;
        }
        .note-box {
            border: 1px solid #d1d5db;
            min-height: 20mm;
            padding: 7px;
            color: #374151;
        }
        .totals {
            border: 1px solid #111827;
        }
        .total-row {
            display: grid;
            grid-template-columns: 1fr 28mm;
            border-bottom: 1px solid #111827;
        }
        .total-row:last-child { border-bottom: 0; }
        .total-row span {
            padding: 6px 8px;
        }
        .total-row span:last-child {
            border-left: 1px solid #111827;
            text-align: right;
            font-weight: 800;
        }
        .footer {
            margin-top: auto;
            padding-top: 8mm;
            text-align: center;
            color: #374151;
        }
        .generated-school {
            color: #111827;
            font-size: 14px;
            font-weight: 800;
            line-height: 1.25;
        }
        .generated-divider {
            width: 72mm;
            margin: 5mm auto 4mm;
            border-top: 1px solid #d1d5db;
        }
        .generated-note {
            color: #6b7280;
            font-size: 11px;
            font-weight: 700;
        }
        .signature {
            width: 42mm;
            margin-left: auto;
            margin-top: 8mm;
            border-top: 1px solid #111827;
            padding-top: 5px;
            text-align: center;
            font-weight: 700;
            color: #111827;
        }
        @media print {
            body { background: #fff; }
            .toolbar { display: none; }
            .sheet {
                width: auto;
                margin: 0;
                padding: 0;
                box-shadow: none;
            }
            .copy {
                min-height: 0;
            }
            .student-copy {
                min-height: 132mm;
            }
        }
    </style>
</head>
<body>
<div class="toolbar">
    <button class="btn" onclick="window.print()">Print Receipt</button>
</div>
<div class="sheet">
    {% include "institute_admin/partials/receipt_copy.html" with copy_label="Office Copy" copy_type="office" show_due_breakup=False %}
    <div class="cut-line"><span>Cut Here</span></div>
    {% include "institute_admin/partials/receipt_copy.html" with copy_label="Student Copy" copy_type="student" show_due_breakup=True %}
</div>
</body>
</html>
