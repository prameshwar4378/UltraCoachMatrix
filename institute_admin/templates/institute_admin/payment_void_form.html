<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #f8fafc, #fee2e2); min-height: 100vh; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .form-container { max-width: 760px; margin: 0 auto; background: #fff; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,.1); overflow: hidden; }
        .form-header { background: linear-gradient(135deg, #dc2626, #991b1b); color: #fff; padding: 30px 40px; }
        .form-header h1 { font-weight: 700; margin-bottom: 6px; }
        .form-header p { opacity: .9; margin: 0; }
        .form-body { padding: 40px; }
        .form-section { background: #f8fafc; border-radius: 15px; padding: 25px; margin-bottom: 30px; border-left: 5px solid #dc2626; }
        .form-label { font-weight: 600; color: #1e293b; margin-bottom: 10px; display: flex; gap: 8px; align-items: center; }
        .form-control { border: 2px solid #e2e8f0; border-radius: 10px; padding: 13px 15px; }
        .form-actions { background: #fff; padding-top: 25px; border-top: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; gap: 20px; }
        .btn { padding: 12px 26px; border-radius: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>
<div class="form-container">
    <div class="form-header">
        <h1><i class="bi bi-slash-circle me-2"></i>{{ title }}</h1>
        <p>{{ subtitle }} - {{ payment.invoice.title }} / {{ payment.amount }}</p>
    </div>
    <form method="POST" class="form-body">
        {% csrf_token %}
        {% if form.non_field_errors %}<div class="alert alert-danger">{{ form.non_field_errors }}</div>{% endif %}
        <div class="form-section">
            <label class="form-label"><i class="bi bi-shield-check"></i> Void Reason</label>
            {{ form.void_reason }}
            {{ form.void_reason.errors }}
        </div>
        <div class="form-actions">
            <div class="text-muted"><i class="bi bi-info-circle me-1"></i> Voided payments stay in history but no longer count as paid.</div>
            <div class="d-flex gap-3">
                <button type="button" class="btn btn-light border" onclick="window.close()"><i class="bi bi-x-circle"></i> Cancel</button>
                <button type="submit" class="btn btn-danger"><i class="bi bi-slash-circle"></i> {{ button_text }}</button>
            </div>
        </div>
    </form>
</div>
</body>
</html>
