<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download App | UltraCoachMatrix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <main class="min-vh-100 d-flex align-items-center justify-content-center p-3">
        <section class="bg-white border rounded-3 shadow-sm p-4 text-center" style="max-width: 520px;">
            <h1 class="h3 fw-bold">Student access is available on Android</h1>
            <p class="text-muted mb-4">Please download the UltraCoachMatrix Android application to view attendance, homework, exams, results, notices, and fee updates.</p>
            <div class="alert alert-info mb-4">Android app download link will be shared by your institute.</div>
            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-secondary">Logout</button>
            </form>
        </section>
    </main>
</body>
</html>
