<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup | UltraCoachMatrix</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #eef6ff, #ffffff);
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    .auth-card {
      width: min(720px, calc(100% - 28px));
      background: #fff;
      border: 1px solid #e1eaf6;
      border-radius: 8px;
      padding: 34px;
      box-shadow: 0 22px 58px rgba(18,60,122,.16);
    }
  </style>
</head>
<body>
  <main class="auth-card">
    <div class="mb-4">
      <div class="h3 fw-bold mb-1">Create Institute Account</div>
      <div class="text-muted">The first user becomes the Institute Admin.</div>
    </div>

    <form method="post" novalidate>
      {% csrf_token %}
      <div class="row g-3">
        {% for field in form %}
          <div class="col-md-6">
            <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% for error in field.errors %}
              <div class="text-danger small fw-bold mt-1">{{ error }}</div>
            {% endfor %}
          </div>
        {% endfor %}
      </div>

      {% if form.non_field_errors %}
        <div class="alert alert-danger mt-3">{{ form.non_field_errors }}</div>
      {% endif %}

      <button class="btn btn-primary w-100 mt-4" type="submit">Create account</button>
    </form>

    <div class="text-center mt-3">
      <a href="{% url 'login' %}">Already have an account?</a>
    </div>
  </main>
</body>
</html>
