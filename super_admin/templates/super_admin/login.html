<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | UltraCoachMatrix</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #eef6ff, #ffffff);
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    .auth-card {
      width: min(430px, calc(100% - 28px));
      background: #fff;
      border: 1px solid #e1eaf6;
      border-radius: 8px;
      padding: 34px;
      box-shadow: 0 22px 58px rgba(18,60,122,.16);
    }
  </style>
</head>
<body>
  <main class="auth-card">
    <div class="mb-4">
      <div class="h3 fw-bold mb-1">UltraCoachMatrix</div>
      <div class="text-muted">Login to your coaching dashboard.</div>
    </div>

    {% if form.errors %}
      <div class="alert alert-danger">Invalid username or password.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label" for="{{ form.username.id_for_label }}">Username</label>
        <input class="form-control" type="text" name="{{ form.username.html_name }}" id="{{ form.username.id_for_label }}" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label" for="{{ form.password.id_for_label }}">Password</label>
        <input class="form-control" type="password" name="{{ form.password.html_name }}" id="{{ form.password.id_for_label }}" required>
      </div>
      <button class="btn btn-primary w-100" type="submit">Login</button>
    </form>

    <div class="text-center mt-3">
      <a href="{% url 'signup' %}">Create institute account</a>
    </div>
  </main>
</body>
</html>
