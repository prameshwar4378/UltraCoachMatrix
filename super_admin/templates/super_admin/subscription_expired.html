{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Software Access Expired</title>
    <link rel="icon" type="image/png" href="{% static 'img/favicon.png' %}">
    <style>
        body { margin:0; min-height:100vh; display:grid; place-items:center; background:#f8fafc; font-family:Arial,sans-serif; color:#0f172a; }
        .card { width:min(520px,calc(100% - 32px)); padding:32px; background:#fff; border:1px solid #e2e8f0; border-radius:12px; box-shadow:0 18px 45px rgba(15,23,42,.08); text-align:center; }
        h1 { margin:0 0 12px; font-size:1.8rem; }
        p { color:#64748b; line-height:1.6; }
        a { display:inline-block; margin-top:12px; padding:11px 18px; border-radius:8px; background:#2563eb; color:#fff; text-decoration:none; font-weight:700; }
    </style>
</head>
<body>
    <main class="card">
        <h1>Software Access Expired</h1>
        <p>{{ reason }}</p>
        <p>Please contact UltraCoachMatrix administration to renew your access.</p>
        <a href="{% url 'logout' %}">Sign out</a>
    </main>
</body>
</html>
