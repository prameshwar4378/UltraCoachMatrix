{% extends "website_base.html" %}

{% block content %}
<main class="legal-page">
  <section class="legal-hero">
    <div class="legal-shell">
      <span class="legal-eyebrow"><i class="bi bi-shield-check"></i> {{ eyebrow }}</span>
      <h1>{{ title }}</h1>
      <p>{{ intro }}</p>
    </div>
  </section>

  <section class="legal-content">
    <div class="legal-shell legal-grid">
      {% for section in sections %}
      <article class="legal-card">
        <h2>{{ section.heading }}</h2>
        <p>{{ section.body }}</p>
      </article>
      {% endfor %}
    </div>
  </section>

  <section class="legal-contact">
    <div class="legal-shell legal-contact-box">
      <div>
        <span>Need help?</span>
        <h2>Talk to the UltraCoachMatrix team.</h2>
      </div>
      <a href="{% url 'web_contact_us' %}">Contact us <i class="bi bi-arrow-right"></i></a>
    </div>
  </section>
</main>

<style>
.legal-page{
  background:linear-gradient(135deg,#f6f9ff,#ffffff 48%,#eef8ff);
  color:var(--text);
}

.legal-shell{
  width:min(1120px,calc(100% - 36px));
  margin:auto;
}

.legal-hero{
  padding:110px 0 58px;
  text-align:center;
}

.legal-eyebrow{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:10px 16px;
  border-radius:999px;
  color:var(--primary);
  background:rgba(18,60,122,.08);
  border:1px solid rgba(18,60,122,.1);
  font-size:13px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.8px;
}

.legal-hero h1{
  margin:24px auto 16px;
  max-width:760px;
  color:var(--dark);
  font-size:clamp(38px,6vw,68px);
  line-height:1.03;
  font-weight:950;
}

.legal-hero p{
  max-width:760px;
  margin:auto;
  color:var(--muted);
  font-size:18px;
  line-height:1.8;
  font-weight:600;
}

.legal-content{
  padding:18px 0 80px;
}

.legal-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:22px;
}

.legal-card{
  padding:30px;
  border-radius:28px;
  background:#fff;
  border:1px solid rgba(18,60,122,.09);
  box-shadow:0 24px 70px rgba(18,60,122,.09);
}

.legal-card h2{
  margin:0 0 12px;
  color:var(--primary);
  font-size:22px;
  font-weight:950;
}

.legal-card p{
  margin:0;
  color:var(--muted);
  font-size:15px;
  line-height:1.8;
  font-weight:600;
}

.legal-contact{
  padding:0 0 90px;
}

.legal-contact-box{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:24px;
  padding:34px;
  border-radius:32px;
  color:#fff;
  background:linear-gradient(135deg,#071527,#123c7a);
  box-shadow:0 30px 90px rgba(7,21,39,.18);
}

.legal-contact-box span{
  color:#ffe59a;
  font-size:13px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.8px;
}

.legal-contact-box h2{
  margin:8px 0 0;
  font-size:28px;
  font-weight:950;
}

.legal-contact-box a{
  display:inline-flex;
  align-items:center;
  gap:10px;
  flex-shrink:0;
  padding:14px 22px;
  border-radius:999px;
  color:#071527;
  background:linear-gradient(135deg,#ffe59a,var(--accent));
  text-decoration:none;
  font-weight:950;
}

@media(max-width:768px){
  .legal-hero{padding:84px 0 44px}
  .legal-grid{grid-template-columns:1fr}
  .legal-card{padding:24px;border-radius:22px}
  .legal-contact-box{align-items:flex-start;flex-direction:column;border-radius:24px;padding:26px}
  .legal-contact-box h2{font-size:24px}
}
</style>
{% endblock content %}
